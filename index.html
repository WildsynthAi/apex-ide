<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX IDE — Sovereign Local</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Orbitron:wght@600;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── ROOT VARS ── */
:root {
  --bg:        #050505;
  --surface:   #0c0d10;
  --panel:     #0f1015;
  --border:    rgba(0,255,157,0.12);
  --border-hi: rgba(0,255,157,0.35);
  --mint:      #00ff9d;
  --mint-dim:  rgba(0,255,157,0.55);
  --cyan:      #00e5ff;
  --amber:     #ffaa00;
  --red:       #ff4466;
  --text:      #c8d0c8;
  --text-dim:  rgba(200,208,200,0.45);
  --glow:      0 0 16px rgba(0,255,157,0.35);
  --glow-sm:   0 0 8px  rgba(0,255,157,0.25);
  --radius:    5px;
  --mono:      'JetBrains Mono', monospace;
  --ui:        'Rajdhani', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  overflow: hidden;
  cursor: default;
}

/* ══════════════════════════════
   TITLEBAR
══════════════════════════════ */
#titlebar {
  height: 38px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  z-index: 200;
  position: relative;
  flex-shrink: 0;
}

.tb-logo {
  font-family: 'Orbitron', monospace;
  font-size: 0.7rem;
  font-weight: 900;
  letter-spacing: 4px;
  color: var(--mint);
  text-shadow: var(--glow-sm);
}

.tb-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
}

#cmd-palette-btn {
  background: rgba(0,255,157,0.06);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 16px;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; gap: 8px;
  width: 260px;
}
#cmd-palette-btn:hover { border-color: var(--border-hi); color: var(--mint); }
.cmd-key {
  margin-left: auto;
  background: rgba(0,255,157,0.08);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 0.6rem;
  color: var(--text-dim);
}

.tb-right {
  display: flex; align-items: center; gap: 14px;
  font-size: 0.65rem; color: var(--text-dim); letter-spacing: 1px;
}

.status-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
.s-online { background: var(--mint); box-shadow: 0 0 6px var(--mint); }
.s-warn   { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.s-off    { background: #444; }

.tb-model-badge {
  font-family: var(--ui); font-weight: 600;
  font-size: 0.7rem; letter-spacing: 1px;
  color: var(--mint); padding: 2px 8px;
  border: 1px solid rgba(0,255,157,0.25);
  border-radius: 3px;
  background: rgba(0,255,157,0.05);
}

/* ══════════════════════════════
   LAYOUT SHELL
══════════════════════════════ */
#shell {
  display: flex;
  height: calc(100vh - 38px - 26px);
}

/* ══════════════════════════════
   LEFT SIDEBAR — FILE VAULT
══════════════════════════════ */
#vault {
  width: 210px;
  min-width: 160px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  transition: width 0.25s ease;
}
#vault.collapsed { width: 0; min-width: 0; }

.panel-head {
  height: 32px;
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px;
  border-bottom: 1px solid var(--border);
  font-size: 0.6rem;
  letter-spacing: 3px;
  color: var(--text-dim);
  text-transform: uppercase;
  flex-shrink: 0;
}
.panel-head-icon { color: var(--mint); font-size: 0.75rem; }

.file-tree { flex: 1; overflow-y: auto; padding: 6px 0; }
.file-tree::-webkit-scrollbar { width: 3px; }
.file-tree::-webkit-scrollbar-thumb { background: var(--border-hi); }

.tree-folder {
  padding: 5px 12px;
  font-size: 0.7rem;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  letter-spacing: 0.5px;
  transition: color 0.15s;
}
.tree-folder:hover { color: var(--text); }
.tree-folder .arrow { font-size: 0.55rem; }

.tree-file {
  padding: 4px 12px 4px 28px;
  font-size: 0.7rem;
  color: var(--text-dim);
  cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  border-left: 2px solid transparent;
  transition: all 0.15s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tree-file:hover { color: var(--text); background: rgba(0,255,157,0.04); }
.tree-file.active {
  color: var(--mint); border-left-color: var(--mint);
  background: rgba(0,255,157,0.06);
}
.file-ext { font-size: 0.6rem; opacity: 0.5; margin-left: auto; flex-shrink: 0; }

.vault-bottom {
  border-top: 1px solid var(--border);
  padding: 8px;
  flex-shrink: 0;
}
.new-file-btn {
  width: 100%;
  padding: 5px;
  background: rgba(0,255,157,0.06);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--mint-dim);
  font-family: var(--mono);
  font-size: 0.65rem;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.2s;
}
.new-file-btn:hover { background: rgba(0,255,157,0.12); color: var(--mint); }

/* ══════════════════════════════
   CENTER — THE FORGE (EDITOR)
══════════════════════════════ */
#forge {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg);
  position: relative;
}

/* TAB BAR */
#tab-bar {
  height: 34px;
  display: flex;
  align-items: flex-end;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
}
#tab-bar::-webkit-scrollbar { height: 0; }

.tab {
  height: 32px;
  padding: 0 14px;
  display: flex; align-items: center; gap: 8px;
  font-size: 0.7rem;
  color: var(--text-dim);
  cursor: pointer;
  border-right: 1px solid var(--border);
  border-top: 1px solid transparent;
  white-space: nowrap;
  transition: all 0.15s;
  position: relative;
  flex-shrink: 0;
}
.tab:hover { color: var(--text); background: rgba(255,255,255,0.02); }
.tab.active {
  color: var(--mint);
  background: var(--bg);
  border-top-color: var(--mint);
}
.tab .tab-close {
  font-size: 0.7rem;
  opacity: 0;
  transition: opacity 0.15s;
  color: var(--text-dim);
  margin-left: 2px;
}
.tab:hover .tab-close { opacity: 1; }
.tab-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }
.tab-dot.saved { background: transparent; }

/* EDITOR AREA */
#editor-wrap {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* LINE NUMBERS */
#line-nums {
  width: 46px;
  background: var(--bg);
  border-right: 1px solid rgba(255,255,255,0.04);
  padding: 14px 0;
  overflow: hidden;
  flex-shrink: 0;
  text-align: right;
  color: rgba(255,255,255,0.18);
  font-size: 0.72rem;
  line-height: 1.7;
  user-select: none;
  font-family: var(--mono);
}
.line-num { padding-right: 12px; display: block; }
.line-num.active { color: var(--mint-dim); }

/* CODE EDITOR */
#editor {
  flex: 1;
  background: var(--bg);
  color: var(--text);
  border: none;
  outline: none;
  resize: none;
  font-family: var(--mono);
  font-size: 13px;
  line-height: 1.7;
  padding: 14px 14px 14px 10px;
  tab-size: 4;
  caret-color: var(--mint);
  overflow-y: auto;
  overflow-x: auto;
  white-space: pre;
}
#editor::-webkit-scrollbar { width: 6px; height: 6px; }
#editor::-webkit-scrollbar-thumb { background: rgba(0,255,157,0.15); border-radius: 3px; }

/* SELECTION HINT */
#selection-hint {
  position: absolute;
  bottom: 10px; right: 10px;
  background: rgba(0,255,157,0.08);
  border: 1px solid var(--border-hi);
  border-radius: 4px;
  padding: 5px 12px;
  font-size: 0.65rem;
  color: var(--mint);
  letter-spacing: 1px;
  display: none;
  cursor: pointer;
  transition: all 0.2s;
}
#selection-hint:hover { background: rgba(0,255,157,0.16); }
#selection-hint.visible { display: block; }

/* LIVE PREVIEW PANEL */
#preview-panel {
  height: 200px;
  background: #000;
  border-top: 1px solid var(--border);
  display: none;
  flex-direction: column;
  flex-shrink: 0;
}
#preview-panel.visible { display: flex; }
.preview-head {
  height: 28px; display: flex; align-items: center;
  padding: 0 12px; gap: 8px;
  border-bottom: 1px solid var(--border);
  font-size: 0.6rem; letter-spacing: 2px; color: var(--text-dim);
  flex-shrink: 0;
}
.preview-head-btn {
  margin-left: auto;
  background: none; border: 1px solid var(--border);
  border-radius: 3px; padding: 2px 8px;
  color: var(--text-dim); font-size: 0.6rem;
  cursor: pointer; transition: all 0.15s;
}
.preview-head-btn:hover { color: var(--mint); border-color: var(--border-hi); }
#preview-iframe {
  flex: 1; border: none;
  background: #000;
}

/* ══════════════════════════════
   RESIZE HANDLE
══════════════════════════════ */
#resizer {
  width: 4px;
  background: var(--border);
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.2s;
  position: relative;
  z-index: 10;
}
#resizer:hover, #resizer.dragging { background: var(--mint); }

/* ══════════════════════════════
   RIGHT SIDEBAR — THE BRAIN (AI)
══════════════════════════════ */
#brain {
  width: 340px;
  min-width: 260px;
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: width 0.25s ease;
}
#brain.collapsed { width: 0; min-width: 0; }

/* AI HEADER */
#brain-head {
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brain-title {
  font-family: var(--ui); font-weight: 700;
  font-size: 0.8rem; letter-spacing: 3px;
  color: var(--mint); text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.brain-model-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 0.62rem; color: var(--text-dim);
}
#model-select {
  flex: 1;
  background: rgba(0,255,157,0.05);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--mint-dim);
  font-family: var(--mono);
  font-size: 0.62rem;
  padding: 3px 7px;
  cursor: pointer;
  outline: none;
}
#model-select option { background: #0c0d10; }

.ollama-url-row {
  display: flex; gap: 5px; margin-top: 5px;
}
#ollama-url {
  flex: 1;
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-dim);
  font-family: var(--mono);
  font-size: 0.6rem;
  padding: 3px 7px;
  outline: none;
}
#ollama-url:focus { border-color: var(--border-hi); color: var(--text); }
#test-conn-btn {
  padding: 3px 10px;
  background: rgba(0,255,157,0.07);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--mint-dim);
  font-size: 0.6rem;
  cursor: pointer;
  font-family: var(--mono);
  transition: all 0.2s; white-space: nowrap;
}
#test-conn-btn:hover { background: rgba(0,255,157,0.14); color: var(--mint); }

/* CONTEXT BADGE */
#context-badge {
  margin: 6px 14px 0;
  padding: 4px 10px;
  background: rgba(0,229,255,0.06);
  border: 1px solid rgba(0,229,255,0.2);
  border-radius: 3px;
  font-size: 0.6rem;
  color: var(--cyan);
  letter-spacing: 1px;
  display: none;
}
#context-badge.visible { display: block; }

/* CHAT WINDOW */
#chat-window {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#chat-window::-webkit-scrollbar { width: 3px; }
#chat-window::-webkit-scrollbar-thumb { background: var(--border-hi); }

.chat-msg {
  display: flex;
  flex-direction: column;
  gap: 4px;
  animation: msgIn 0.2s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg-role {
  font-size: 0.58rem;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.msg-role.user  { color: var(--amber); }
.msg-role.ai    { color: var(--mint); }
.msg-role.sys   { color: var(--text-dim); }

.msg-bubble {
  padding: 8px 11px;
  border-radius: 4px;
  font-size: 0.72rem;
  line-height: 1.65;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg-bubble.user {
  background: rgba(255,170,0,0.06);
  border: 1px solid rgba(255,170,0,0.15);
  color: var(--text);
}
.msg-bubble.ai {
  background: rgba(0,255,157,0.05);
  border: 1px solid var(--border);
  color: var(--text);
}
.msg-bubble.sys {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  color: var(--text-dim);
  font-size: 0.65rem;
}
.msg-bubble code {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 3px;
  padding: 0 4px;
  color: var(--cyan);
  font-family: var(--mono);
}
.msg-bubble pre {
  background: #000;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px;
  overflow-x: auto;
  margin-top: 6px;
  font-size: 0.68rem;
  color: var(--mint-dim);
}

/* THINKING INDICATOR */
.thinking {
  display: flex; gap: 4px; align-items: center;
  padding: 8px 11px;
}
.think-dot {
  width: 5px; height: 5px;
  border-radius: 50%; background: var(--mint);
  animation: thinkBounce 1.2s ease-in-out infinite;
}
.think-dot:nth-child(2) { animation-delay: 0.15s; }
.think-dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes thinkBounce {
  0%,80%,100% { transform: scale(0.6); opacity: 0.3; }
  40%         { transform: scale(1);   opacity: 1; }
}

/* CHAT INPUT */
#chat-input-area {
  border-top: 1px solid var(--border);
  padding: 10px;
  flex-shrink: 0;
}

#context-toggle-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 6px; font-size: 0.6rem; color: var(--text-dim);
}
#ctx-toggle {
  appearance: none; width: 28px; height: 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border); border-radius: 10px;
  cursor: pointer; position: relative; transition: background 0.2s;
}
#ctx-toggle:checked { background: rgba(0,255,157,0.3); border-color: var(--mint); }
#ctx-toggle::after {
  content: '';
  position: absolute; top: 2px; left: 2px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-dim); transition: left 0.2s, background 0.2s;
}
#ctx-toggle:checked::after { left: 16px; background: var(--mint); }

#chat-input {
  width: 100%;
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.72rem;
  padding: 8px 10px;
  resize: none;
  outline: none;
  line-height: 1.5;
  min-height: 60px;
  max-height: 120px;
  transition: border-color 0.2s;
}
#chat-input:focus { border-color: var(--border-hi); }
#chat-input::placeholder { color: var(--text-dim); }

#chat-actions {
  display: flex; gap: 6px; margin-top: 6px; align-items: center;
}
.chat-action-btn {
  padding: 5px 12px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 0.65rem;
  cursor: pointer;
  border: 1px solid var(--border);
  letter-spacing: 1px;
  transition: all 0.2s;
}
#send-btn {
  background: rgba(0,255,157,0.12);
  color: var(--mint);
  flex: 1;
  border-color: rgba(0,255,157,0.3);
}
#send-btn:hover { background: rgba(0,255,157,0.22); box-shadow: var(--glow-sm); }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#clear-btn {
  background: rgba(255,255,255,0.03);
  color: var(--text-dim);
}
#clear-btn:hover { color: var(--red); border-color: rgba(255,68,102,0.3); }
#inject-btn {
  background: rgba(0,229,255,0.07);
  color: var(--cyan);
  border-color: rgba(0,229,255,0.2);
}
#inject-btn:hover { background: rgba(0,229,255,0.15); }

/* ══════════════════════════════
   STATUS BAR
══════════════════════════════ */
#statusbar {
  height: 26px;
  background: rgba(0,255,157,0.07);
  border-top: 1px solid rgba(0,255,157,0.2);
  display: flex; align-items: center;
  padding: 0 14px; gap: 20px;
  font-size: 0.6rem; letter-spacing: 1.5px;
  color: var(--text-dim); flex-shrink: 0;
}
.sb-item { display: flex; align-items: center; gap: 5px; }
.sb-item.active-item { color: var(--mint); }
.sb-sep { opacity: 0.2; }
#sb-cursor { margin-left: auto; }
#sb-conn { cursor: pointer; }
#sb-conn:hover { color: var(--mint); }

/* ══════════════════════════════
   COMMAND PALETTE OVERLAY
══════════════════════════════ */
#palette-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  align-items: flex-start; justify-content: center;
  padding-top: 80px;
}
#palette-overlay.open { display: flex; }
#palette-box {
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: 8px;
  width: 560px; max-width: 95vw;
  box-shadow: 0 0 40px rgba(0,255,157,0.15);
  overflow: hidden;
}
#palette-input {
  width: 100%; padding: 14px 18px;
  background: transparent; border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text); font-family: var(--mono);
  font-size: 0.85rem; outline: none;
  caret-color: var(--mint);
}
#palette-input::placeholder { color: var(--text-dim); }
#palette-results { max-height: 300px; overflow-y: auto; }
.p-result {
  padding: 9px 18px;
  display: flex; align-items: center; gap: 10px;
  font-size: 0.72rem; color: var(--text-dim);
  cursor: pointer; transition: all 0.1s;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.p-result:hover, .p-result.sel {
  background: rgba(0,255,157,0.07);
  color: var(--mint);
}
.p-result-icon { font-size: 0.8rem; width: 16px; text-align: center; flex-shrink: 0; }
.p-result-key {
  margin-left: auto;
  font-size: 0.6rem;
  background: rgba(0,255,157,0.08);
  border: 1px solid var(--border);
  padding: 1px 6px; border-radius: 3px;
  color: var(--text-dim);
}

/* ══════════════════════════════
   TOAST NOTIFICATION
══════════════════════════════ */
#toast {
  position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border-hi);
  border-radius: 4px; padding: 7px 18px;
  font-size: 0.68rem; letter-spacing: 1px;
  color: var(--mint); z-index: 9999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
  white-space: nowrap;
}
#toast.show { opacity: 1; }
#toast.error { color: var(--red); border-color: rgba(255,68,102,0.4); }

/* SCROLLBAR GLOBAL */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,255,157,0.15); border-radius: 3px; }

/* MOBILE RESPONSIVE */
@media (max-width: 700px) {
  #vault { display: none; }
  #brain { width: 100%; position: fixed; right: 0; top: 38px; bottom: 26px; z-index: 50; transform: translateX(100%); transition: transform 0.3s; }

<!-- TOAST -->
<div id="toast"></div>

<script>
// ════════════════════════════════
//  STATE
// ════════════════════════════════
const state = {
  files: {
    'src': {
      'main.py': `# APEX UNIVERSE — Main Entry\nimport os\nfrom apex import IDE, AIBridge\n\nif __name__ == '__main__':\n    bridge = AIBridge(\n        model='gemma3:latest',\n        endpoint='http://localhost:11434'\n    )\n    ide = IDE(bridge=bridge)\n    ide.run(port=8080)\n    print('[ APEX ] Local IDE running on :8080')\n`,
      'apex.py': `# Core IDE module\nclass AIBridge:\n    def __init__(self, model, endpoint):\n        self.model    = model\n        self.endpoint = endpoint\n        self.history  = []\n\n    def query(self, prompt, context=None):\n        payload = {'model': self.model}\n        if context:\n            payload['context'] = context\n        # POST to Ollama /api/generate\n        ...\n\nclass IDE:\n    def __init__(self, bridge):\n        self.bridge = bridge\n\n    def run(self, port=8080):\n        ...\n`,
      'config.json': `{\n  "model": "gemma3:latest",\n  "endpoint": "http://localhost:11434",\n  "port": 8080,\n  "auto_save": true,\n  "theme": "apex-dark",\n  "context_window": 4096\n}\n`
    },
    'README.md': `# APEX UNIVERSE — Sovereign AI IDE\n\nFully local. Zero telemetry. Powered by Ollama.\n\n## Quick Start\n\`\`\`bash\nollama serve\npython src/main.py\n\`\`\`\n\n## Models\n- gemma3:latest\n- qwen2.5-coder:3b (recommended for Pixel 9)\n`,
    'requirements.txt': `flask==3.0.0\nrequests==2.31.0\nwebsockets==12.0\n`
  },
  openTabs: ['src/main.py', 'src/config.json', 'README.md'],
  activeTab: 'src/main.py',
  chatHistory: [],
  connected: false,
  thinking: false,
  selection: '',
};

// ════════════════════════════════
//  INIT
// ════════════════════════════════
window.addEventListener('load', () => {
  renderTree();
  renderTabs();
  loadFile(state.activeTab);
  updateClock();
  setInterval(updateClock, 1000);
  testConnection();
  addSysMsg('APEX IDE initialized. Ollama endpoint: ' + document.getElementById('ollama-url').value);
  addSysMsg('Select code in editor, then click "Ask AI about selection" or use ⎙ INJECT to attach context.');
  updateContextBadge();
});

// ════════════════════════════════
//  CLOCK
// ════════════════════════════════
function updateClock() {
  const t = new Date().toTimeString().slice(0,8);
  document.getElementById('tb-clock').textContent = t;
  document.getElementById('sb-time').textContent = t.slice(0,5);
}

// ════════════════════════════════
//  FILE TREE
// ════════════════════════════════
function renderTree() {
  const el = document.getElementById('file-tree');
  el.innerHTML = '';
  renderNode(state.files, el, '');
}

function renderNode(node, container, prefix) {
  Object.keys(node).sort((a,b) => {
    const aDir = typeof node[a] === 'object';
    const bDir = typeof node[b] === 'object';
    if (aDir && !bDir) return -1;
    if (!aDir && bDir) return 1;
    return a.localeCompare(b);
  }).forEach(key => {
    const val = node[key];
    const path = prefix ? prefix + '/' + key : key;
    if (typeof val === 'object') {
      const folder = document.createElement('div');
      folder.className = 'tree-folder';
      folder.innerHTML = `<span class="arrow">▾</span><span>📁</span><span>${key}</span>`;
      folder.onclick = (e) => {
        e.stopPropagation();
        const arr = folder.querySelector('.arrow');
        const children = folder.nextSibling;
        if (children && children.classList.contains('tree-children')) {
          children.style.display = children.style.display === 'none' ? '' : 'none';
          arr.textContent = children.style.display === 'none' ? '▸' : '▾';
        }
      };
      container.appendChild(folder);
      const childWrap = document.createElement('div');
      childWrap.className = 'tree-children';
      container.appendChild(childWrap);
      renderNode(val, childWrap, path);
    } else {
      const file = document.createElement('div');
      file.className = 'tree-file' + (state.activeTab === path ? ' active' : '');
      file.dataset.path = path;
      const ext = key.split('.').pop();
      file.innerHTML = `<span>${fileIcon(ext)}</span><span style="overflow:hidden;text-overflow:ellipsis">${key}</span><span class="file-ext">.${ext}</span>`;
      file.onclick = () => openFile(path);
      container.appendChild(file);
    }
  });
}

function fileIcon(ext) {
  const map = { py:'🐍', js:'⚡', html:'🌐', css:'🎨', json:'{}', md:'📄', txt:'📝', sh:'⚙', ts:'🔷' };
  return map[ext] || '◎';
}

function getFileContent(path) {
  const parts = path.split('/');
  let cur = state.files;
  for (const p of parts) cur = cur[p];
  return cur;
}

function setFileContent(path, content) {
  const parts = path.split('/');
  let cur = state.files;
  for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
  cur[parts[parts.length-1]] = content;
}

function openFile(path) {
  if (!state.openTabs.includes(path)) state.openTabs.push(path);
  state.activeTab = path;
  renderTabs();
  loadFile(path);
  renderTree();
}

function loadFile(path) {
  try {
    const content = getFileContent(path);
    document.getElementById('editor').value = content;
    updateLineNums();
    const ext = path.split('.').pop();
    document.getElementById('sb-file').textContent = path.split('/').pop();
    document.getElementById('sb-lang').textContent = ext.toUpperCase();
    document.getElementById('sb-tokens').textContent = Math.ceil(content.length / 4) + ' TOKENS';
  } catch(e) { console.warn('File not found:', path); }
}

function newFile() {
  const name = prompt('File name (e.g. script.py):');
  if (!name) return;
  state.files[name] = '// ' + name + '\n';
  renderTree();
  openFile(name);
}

// ════════════════════════════════
//  TABS
// ════════════════════════════════
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  state.openTabs.forEach(path => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (state.activeTab === path ? ' active' : '');
    const name = path.split('/').pop();
    tab.innerHTML = `<span class="tab-dot saved"></span><span>${name}</span><span class="tab-close" onclick="closeTab(event,'${path}')">✕</span>`;
    tab.onclick = () => { state.activeTab = path; renderTabs(); loadFile(path); renderTree(); };
    bar.appendChild(tab);
  });
}

function closeTab(e, path) {
  e.stopPropagation();
  state.openTabs = state.openTabs.filter(t => t !== path);
  if (state.activeTab === path) state.activeTab = state.openTabs[state.openTabs.length-1] || '';
  renderTabs();
  if (state.activeTab) loadFile(state.activeTab);
  else document.getElementById('editor').value = '';
  renderTree();
}

// ════════════════════════════════
//  EDITOR
// ════════════════════════════════
const editor = document.getElementById('editor');

editor.addEventListener('input', () => {
  if (state.activeTab) setFileContent(state.activeTab, editor.value);
  updateLineNums();
  const tab = document.querySelector('.tab.active .tab-dot');
  if (tab) { tab.classList.remove('saved'); }
  document.getElementById('sb-tokens').textContent = Math.ceil(editor.value.length / 4) + ' TOKENS';
});

editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, end = editor.selectionEnd;
    editor.value = editor.value.substring(0,s) + '    ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = s + 4;
  }
  // Auto-save on Ctrl+S
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); autoSave(); }
});

editor.addEventListener('keyup', updateCursor);
editor.addEventListener('click', updateCursor);
editor.addEventListener('mouseup', checkSelection);
editor.addEventListener('keyup', checkSelection);

function updateCursor() {
  const text = editor.value.substring(0, editor.selectionStart);
  const lines = text.split('\n');
  const ln = lines.length, col = lines[lines.length-1].length + 1;
  document.getElementById('sb-cursor').textContent = `LN ${ln} COL ${col}`;
}

function checkSelection() {
  const sel = editor.value.substring(editor.selectionStart, editor.selectionEnd).trim();
  state.selection = sel;
  const hint = document.getElementById('selection-hint');
  const selInfo = document.getElementById('sel-info');
  if (sel.length > 10) {
    hint.classList.add('visible');
    selInfo.textContent = sel.length + ' chars selected';
  } else {
    hint.classList.remove('visible');
    selInfo.textContent = '';
  }
}

function updateLineNums() {
  const lines = editor.value.split('\n').length;
  const cursor = editor.value.substring(0, editor.selectionStart).split('\n').length;
  let html = '';
  for (let i = 1; i <= lines; i++) {
    html += `<span class="line-num${i===cursor?' active':''}">${i}</span>`;
  }
  document.getElementById('line-nums').innerHTML = html;
}

function autoSave() {
  if (state.activeTab) setFileContent(state.activeTab, editor.value);
  const tab = document.querySelector('.tab.active .tab-dot');
  if (tab) tab.classList.add('saved');
  toast('Saved: ' + state.activeTab.split('/').pop());
}

editor.addEventListener('scroll', () => {
  document.getElementById('line-nums').scrollTop = editor.scrollTop;
});

// ════════════════════════════════
//  LIVE PREVIEW
// ════════════════════════════════
function togglePreview() {
  const p = document.getElementById('preview-panel');
  p.classList.toggle('visible');
}
function runPreview() {
  const p = document.getElementById('preview-panel');
  p.classList.add('visible');
  const iframe = document.getElementById('preview-iframe');
  const content = editor.value;
  const ext = state.activeTab.split('.').pop();
  if (ext === 'html') {
    iframe.srcdoc = content;
    document.getElementById('preview-status').textContent = '— running HTML';
  } else {
    iframe.srcdoc = `<html><body style="background:#000;color:#0f0;font-family:monospace;padding:20px"><pre>${content.replace(/</g,'&lt;')}</pre></body></html>`;
    document.getElementById('preview-status').textContent = '— raw view';
  }
}

// ════════════════════════════════
//  OLLAMA CONNECTION TEST
// ════════════════════════════════
async function testConnection() {
  const url = document.getElementById('ollama-url').value.trim();
  const dot = document.getElementById('conn-dot');
  const sbDot = document.getElementById('sb-dot');
  const label = document.getElementById('conn-label');

  try {
    const resp = await fetch(url + '/api/tags', { signal: AbortSignal.timeout(4000) });
    if (resp.ok) {
      const data = await resp.json();
      state.connected = true;
      dot.className = 'status-dot s-online';
      sbDot.className = 'status-dot s-online';
      label.textContent = 'OLLAMA ONLINE';
      // Populate model list
      if (data.models && data.models.length) {
        const sel = document.getElementById('model-select');
        const current = sel.value;
        sel.innerHTML = '';
        data.models.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.name; opt.textContent = m.name;
          if (m.name === current) opt.selected = true;
          sel.appendChild(opt);
        });
        updateModelBadge();
      }
      toast('Ollama connected ✓ — ' + (data.models?.length||0) + ' models found');
      addSysMsg('✓ Connected to Ollama at ' + url + '. Models: ' + (data.models||[]).map(m=>m.name).join(', '));
    } else throw new Error('Non-OK response');
  } catch(e) {
    state.connected = false;
    dot.className = 'status-dot s-warn';
    sbDot.className = 'status-dot s-warn';
    label.textContent = 'OLLAMA OFFLINE';
    toast('Cannot reach Ollama — is it running in Termux?', true);
    addSysMsg('✗ Cannot connect to ' + url + '. Run: ollama serve  in Termux.');
  }
}

function updateModelBadge() {
  const m = document.getElementById('model-select').value;
  document.getElementById('active-model-badge').textContent = m.split(':')[0].toUpperCase();
}

// ════════════════════════════════
//  AI CHAT
// ════════════════════════════════
function addSysMsg(text) {
  addMessage('sys', text);
}

function addMessage(role, content) {
  const win = document.getElementById('chat-window');
  const wrap = document.createElement('div');
  wrap.className = 'chat-msg';
  const roleEl = document.createElement('div');
  roleEl.className = 'msg-role ' + role;
  roleEl.textContent = role === 'user' ? '[ YOU ]' : role === 'ai' ? '[ AI ]' : '[ SYS ]';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + role;
  bubble.innerHTML = formatMsg(content);
  wrap.appendChild(roleEl);
  wrap.appendChild(bubble);
  win.appendChild(wrap);
  win.scrollTop = win.scrollHeight;
  return bubble;
}

function formatMsg(text) {
  // Basic code block and inline code formatting
  return text
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '\n');
}

function showThinking() {
  const win = document.getElementById('chat-window');
  const div = document.createElement('div');
  div.id = 'thinking-indicator';
  div.className = 'chat-msg';
  div.innerHTML = `<div class="msg-role ai">[ AI ]</div><div class="thinking"><div class="think-dot"></div><div class="think-dot"></div><div class="think-dot"></div></div>`;
  win.appendChild(div);
  win.scrollTop = win.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking-indicator');
  if (el) el.remove();
}

function updateContextBadge() {
  const badge = document.getElementById('context-badge');
  const on = document.getElementById('ctx-toggle').checked;
  badge.classList.toggle('visible', on);
}

function injectContext() {
  const sel = state.selection || editor.value;
  const input = document.getElementById('chat-input');
  const snippet = sel.length > 800 ? sel.slice(0,800) + '\n[...truncated]' : sel;
  input.value = '```\n' + snippet + '\n```\n' + input.value;
  input.focus();
}

function sendSelectionToAI() {
  if (!state.selection) return;
  document.getElementById('chat-input').value = 'Explain this code:\n```\n' + state.selection + '\n```';
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const raw = input.value.trim();
  if (!raw || state.thinking) return;

  let prompt = raw;

  // Attach editor context if toggle on
  if (document.getElementById('ctx-toggle').checked && state.activeTab) {
    const ctx = editor.value.slice(0, 2000);
    const file = state.activeTab;
    prompt = `[Context — file: ${file}]\n\`\`\`\n${ctx}\n\`\`\`\n\n[User]\n${raw}`;
  }

  state.chatHistory.push({ role: 'user', content: prompt });
  addMessage('user', raw);
  input.value = '';
  input.style.height = '';

  const url = document.getElementById('ollama-url').value.trim();
  const model = document.getElementById('model-select').value;

  state.thinking = true;
  document.getElementById('send-btn').disabled = true;
  showThinking();

  try {
    const body = {
      model,
      messages: state.chatHistory,
      stream: true,
    };

    const resp = await fetch(url + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(60000),
    });

    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    removeThinking();
    const bubble = addMessage('ai', '');
    let fullText = '';
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = decoder.decode(value).split('\n').filter(Boolean);
      for (const line of lines) {
        try {
          const json = JSON.parse(line);
          if (json.message?.content) {
            fullText += json.message.content;
            bubble.innerHTML = formatMsg(fullText);
            document.getElementById('chat-window').scrollTop = 99999;
          }
        } catch {}
      }
    }

    state.chatHistory.push({ role: 'assistant', content: fullText });

  } catch(e) {
    removeThinking();
    if (!state.connected) {
      addMessage('ai', '✗ Not connected to Ollama. Check endpoint and run "ollama serve" in Termux.\n\nEndpoint: ' + url);
    } else {
      addMessage('ai', '✗ Error: ' + e.message + '\n\nMake sure model is pulled:\n`ollama pull ' + model + '`');
    }
  }

  state.thinking = false;
  document.getElementById('send-btn').disabled = false;
}

function clearChat() {
  state.chatHistory = [];
  document.getElementById('chat-window').innerHTML = '';
  addSysMsg('Chat cleared. History reset.');
}

// Enter to send, Shift+Enter newline
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ════════════════════════════════
//  COMMAND PALETTE
// ════════════════════════════════
const COMMANDS = [
  { icon:'📁', label:'Open: main.py',      key:'', fn: () => openFile('src/main.py') },
  { icon:'📁', label:'Open: apex.py',      key:'', fn: () => openFile('src/apex.py') },
  { icon:'📁', label:'Open: config.json',  key:'', fn: () => openFile('src/config.json') },
  { icon:'📁', label:'Open: README.md',    key:'', fn: () => openFile('README.md') },
  { icon:'🔌', label:'Test Ollama Connection', key:'', fn: testConnection },
  { icon:'💾', label:'Save File',           key:'Ctrl+S', fn: autoSave },
  { icon:'▶',  label:'Run Live Preview',    key:'', fn: () => { runPreview(); closePaletteNow(); } },
  { icon:'✕',  label:'Close Preview',       key:'', fn: togglePreview },
  { icon:'🗑', label:'Clear AI Chat',       key:'', fn: clearChat },
  { icon:'◈',  label:'Inject Code Context', key:'', fn: injectContext },
  { icon:'📋', label:'New File',            key:'', fn: newFile },
];

function openPalette() {
  document.getElementById('palette-overlay').classList.add('open');
  document.getElementById('palette-input').value = '';
  filterPalette();
  setTimeout(() => document.getElementById('palette-input').focus(), 50);
}

function closePaletteNow() {
  document.getElementById('palette-overlay').classList.remove('open');
}

function closePalette(e) {
  if (e.target.id === 'palette-overlay') closePaletteNow();
}

let paletteIdx = 0;
function filterPalette() {
  const q = document.getElementById('palette-input').value.toLowerCase();
  const res = document.getElementById('palette-results');
  const filtered = COMMANDS.filter(c => c.label.toLowerCase().includes(q));
  paletteIdx = 0;
  res.innerHTML = '';
  filtered.forEach((cmd, i) => {
    const el = document.createElement('div');
    el.className = 'p-result' + (i === 0 ? ' sel' : '');
    el.innerHTML = `<span class="p-result-icon">${cmd.icon}</span><span>${cmd.label}</span>${cmd.key ? `<span class="p-result-key">${cmd.key}</span>` : ''}`;
    el.onclick = () => { closePaletteNow(); cmd.fn(); };
    res.appendChild(el);
  });
}

function paletteKey(e) {
  const items = document.querySelectorAll('.p-result');
  if (e.key === 'ArrowDown') { paletteIdx = Math.min(paletteIdx+1, items.length-1); }
  else if (e.key === 'ArrowUp') { paletteIdx = Math.max(paletteIdx-1, 0); }
  else if (e.key === 'Enter') {
    items[paletteIdx]?.click();
    return;
  } else if (e.key === 'Escape') { closePaletteNow(); return; }
  items.forEach((el,i) => el.classList.toggle('sel', i === paletteIdx));
  items[paletteIdx]?.scrollIntoView({ block: 'nearest' });
}

// Ctrl+K
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'k') { e.preventDefault(); openPalette(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); autoSave(); }
});

// ════════════════════════════════
//  RESIZE HANDLE
// ════════════════════════════════
const resizer = document.getElementById('resizer');
let isResizing = false, startX = 0, startW = 0;

resizer.addEventListener('mousedown', (e) => {
  isResizing = true;
  startX = e.clientX;
  startW = document.getElementById('brain').offsetWidth;
  resizer.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});

document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const delta = startX - e.clientX;
  const newW = Math.max(200, Math.min(600, startW + delta));
  document.getElementById('brain').style.width = newW + 'px';
});

document.addEventListener('mouseup', () => {
  if (isResizing) {
    isResizing = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// ════════════════════════════════
//  TOAST
// ════════════════════════════════
let toastTimer;
function toast(msg, error=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (error ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}

// ════════════════════════════════
//  INIT LINE NUMS
// ════════════════════════════════
updateLineNums();
</script>
